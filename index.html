<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<title>لوحة النتائج</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f7f6f3;
  --card: #ffffff;
  --c1: #1a1a1a;
  --c2: #1a1a1a;
  --acc1: #ff5c2b;
  --acc2: #2b7fff;
  --dim: #b0aea8;
  --border: #e8e6e1;
  --radius: 20px;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
font-family: ‘Cairo’, sans-serif;
min-height: 100svh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
padding: 24px 16px 20px;
max-width: 420px;
margin: 0 auto;
}

/* ── TOP BAR ── */
.topbar {
width: 100%;
display: flex;
align-items: center;
justify-content: space-between;
}

.app-label {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–dim);
}

.reset-btn {
font-family: ‘Cairo’, sans-serif;
font-size: 11px;
font-weight: 500;
color: var(–dim);
background: none;
border: 1px solid var(–border);
border-radius: 20px;
padding: 5px 14px;
cursor: pointer;
transition: all 0.15s;
}
.reset-btn:hover { color: #888; border-color: #ccc; }

/* ── SCORES ── */
.scores {
width: 100%;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

.team-card {
background: var(–card);
border: 2px solid transparent;
border-radius: var(–radius);
padding: 18px 16px 16px;
display: flex;
flex-direction: column;
gap: 4px;
cursor: pointer;
transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
position: relative;
overflow: hidden;
box-shadow: var(–shadow);
user-select: none;
-webkit-user-select: none;
}
.team-card:active { transform: scale(0.97); }

.team-card.active-1 {
border-color: var(–acc1);
box-shadow: 0 0 0 4px rgba(255,92,43,0.1), var(–shadow);
}
.team-card.active-2 {
border-color: var(–acc2);
box-shadow: 0 0 0 4px rgba(43,127,255,0.1), var(–shadow);
}

/* Active indicator dot */
.active-dot {
position: absolute;
top: 12px; right: 12px;
width: 7px; height: 7px;
border-radius: 50%;
opacity: 0;
transition: opacity 0.2s;
}
.team-card.active-1 .active-dot { background: var(–acc1); opacity: 1; }
.team-card.active-2 .active-dot { background: var(–acc2); opacity: 1; }

.team-label {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–dim);
outline: none;
cursor: text;
transition: color 0.2s;
}
.team-card.active-1 .team-label { color: var(–acc1); }
.team-card.active-2 .team-label { color: var(–acc2); }

.score-main {
font-family: ‘DM Mono’, monospace;
font-size: 52px;
font-weight: 500;
line-height: 1;
color: var(–c1);
letter-spacing: -0.02em;
transition: transform 0.12s cubic-bezier(0.36,0.07,0.19,0.97);
}

.pending-val {
font-family: ‘DM Mono’, monospace;
font-size: 13px;
font-weight: 400;
min-height: 18px;
transition: opacity 0.15s;
opacity: 0;
}
.pending-val.has-val { opacity: 1; }
.team-card.active-1 .pending-val { color: var(–acc1); }
.team-card.active-2 .pending-val { color: var(–acc2); }

/* Progress bar inside card */
.mini-bar {
margin-top: 8px;
height: 3px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
}
.mini-fill {
height: 100%;
border-radius: 2px;
width: 0%;
transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
}
.team-card.active-1 .mini-fill,
.team-1 .mini-fill { background: var(–acc1); }
.team-card.active-2 .mini-fill,
.team-2 .mini-fill { background: var(–acc2); }

/* needs to match statically for non-active */
#cardA .mini-fill { background: var(–acc1); }
#cardB .mini-fill { background: var(–acc2); }

@keyframes scoreBump {
0%   { transform: scale(1); }
40%  { transform: scale(1.1); }
100% { transform: scale(1); }
}
.bump { animation: scoreBump 0.16s ease-out; }

/* ── HINT ── */
.hint {
font-size: 12px;
color: var(–dim);
letter-spacing: 0.04em;
text-align: center;
min-height: 18px;
transition: opacity 0.2s;
}

/* ── NUMPAD ── */
.numpad-wrap {
width: 100%;
background: var(–card);
border-radius: var(–radius);
padding: 14px;
box-shadow: var(–shadow);
}

.numpad {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
}

.key {
font-family: ‘Cairo’, sans-serif;
font-size: 22px;
font-weight: 500;
padding: 16px 0;
border: none;
border-radius: 14px;
background: var(–bg);
color: #1a1a1a;
cursor: pointer;
transition: background 0.1s, transform 0.08s;
user-select: none;
-webkit-user-select: none;
}
.key:active { transform: scale(0.91); background: #eeede9; }

.key-zero { grid-column: span 2; }

.key-del {
font-size: 18px;
color: var(–dim);
}
.key-del:active { background: #eeede9; }

.key-enter {
grid-column: span 3;
font-size: 18px;
font-weight: 700;
letter-spacing: 0.05em;
padding: 17px 0;
color: #fff;
border-radius: 14px;
border: none;
cursor: pointer;
transition: filter 0.1s, transform 0.08s;
margin-top: 2px;
}
.key-enter:active { transform: scale(0.97); filter: brightness(0.9); }
.enter-1 { background: var(–acc1); box-shadow: 0 4px 16px rgba(255,92,43,0.3); }
.enter-2 { background: var(–acc2); box-shadow: 0 4px 16px rgba(43,127,255,0.3); }
.enter-none { background: #ccc; box-shadow: none; cursor: default; }

/* ── HISTORY LOG ── */
.history-wrap {
width: 100%;
background: var(–card);
border-radius: var(–radius);
box-shadow: var(–shadow);
overflow: hidden;
}
.history-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 16px 10px;
border-bottom: 1px solid var(–border);
cursor: pointer;
user-select: none;
-webkit-user-select: none;
}
.history-title {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–dim);
}
.history-count {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
background: var(–bg);
color: var(–dim);
border-radius: 20px;
padding: 2px 8px;
min-width: 24px;
text-align: center;
}
.history-toggle {
font-size: 11px;
color: var(–dim);
transition: transform 0.25s;
}
.history-toggle.open { transform: rotate(180deg); }
.history-body {
max-height: 0;
overflow: hidden;
transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
}
.history-body.open { max-height: 200px; overflow-y: auto; }
.history-empty {
padding: 14px 16px;
font-size: 12px;
color: var(–dim);
text-align: center;
}
.log-list {
padding: 8px 10px 10px;
display: flex;
flex-direction: column;
gap: 3px;
}
@keyframes logIn {
from { opacity: 0; transform: translateX(-6px); }
to   { opacity: 1; transform: translateX(0); }
}
.log-row {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 8px;
border-radius: 10px;
animation: logIn 0.18s ease;
}
.log-row:nth-child(odd) { background: var(–bg); }
.log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.log-dot.d1 { background: var(–acc1); }
.log-dot.d2 { background: var(–acc2); }
.log-name { font-size: 12px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-name.c1 { color: var(–acc1); }
.log-name.c2 { color: var(–acc2); }
.log-pts { font-family: ‘DM Mono’, monospace; font-size: 12px; color: #aaa; }
.log-arrow { font-size: 10px; color: #ddd; }
.log-total { font-family: ‘DM Mono’, monospace; font-size: 13px; font-weight: 500; color: #1a1a1a; min-width: 28px; text-align: right; }

/* ── WINNER OVERLAY ── */
.overlay {
display: none;
position: fixed;
inset: 0;
z-index: 100;
background: rgba(247,246,243,0.92);
backdrop-filter: blur(16px);
align-items: center;
justify-content: center;
flex-direction: column;
gap: 12px;
padding: 32px;
}
.overlay.show { display: flex; }

@keyframes winPop {
from { transform: scale(0.8) translateY(24px); opacity: 0; }
to   { transform: scale(1) translateY(0); opacity: 1; }
}

.win-inner {
text-align: center;
animation: winPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
}

.win-emoji { font-size: 52px; }
.win-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(–dim); }
.win-name { font-size: 48px; font-weight: 700; line-height: 1; margin: 4px 0; }
.win-name.c1 { color: var(–acc1); }
.win-name.c2 { color: var(–acc2); }
.win-detail { font-size: 13px; color: var(–dim); }
.win-score { font-family: ‘DM Mono’, monospace; font-size: 28px; color: #1a1a1a; margin-top: 4px; }

.win-btn {
margin-top: 24px;
font-family: ‘Cairo’, sans-serif;
font-weight: 700;
font-size: 15px;
padding: 16px 48px;
border: none;
border-radius: 16px;
color: #fff;
cursor: pointer;
transition: filter 0.15s, transform 0.1s;
}
.win-btn:active { transform: scale(0.96); }
.win-btn.c1 { background: var(–acc1); box-shadow: 0 6px 20px rgba(255,92,43,0.3); }
.win-btn.c2 { background: var(–acc2); box-shadow: 0 6px 20px rgba(43,127,255,0.3); }
</style>

</head>
<body>

<!-- Top bar -->

<div class="topbar">
  <span class="app-label">أول من يصل إلى ٢٠٢</span>
  <button class="reset-btn" onclick="resetGame()">↺ إعادة</button>
</div>

<!-- Score cards -->

<div class="scores">
  <div class="team-card" id="cardA" onclick="selectTeam('A')">
    <div class="active-dot"></div>
    <div class="team-label" id="nameA" contenteditable="false" onmousedown="startEditName(event,'A')">الفريق ١</div>
    <div class="score-main" id="scoreA">0</div>
    <div class="pending-val" id="pendingA"></div>
    <div class="mini-bar"><div class="mini-fill" id="barA"></div></div>
  </div>
  <div class="team-card" id="cardB" onclick="selectTeam('B')">
    <div class="active-dot"></div>
    <div class="team-label" id="nameB" contenteditable="false" onmousedown="startEditName(event,'B')">الفريق ٢</div>
    <div class="score-main" id="scoreB">0</div>
    <div class="pending-val" id="pendingB"></div>
    <div class="mini-bar"><div class="mini-fill" id="barB"></div></div>
  </div>
</div>

<!-- Hint -->

<div class="hint" id="hint">اضغط على فريق للاختيار ←</div>

<!-- History Log -->

<div class="history-wrap">
  <div class="history-header" onclick="toggleHistory()">
    <span class="history-title">سجل النتائج</span>
    <span class="history-count" id="historyCount">0</span>
    <span class="history-toggle" id="historyToggle">▼</span>
  </div>
  <div class="history-body" id="historyBody">
    <div class="history-empty" id="historyEmpty">لا توجد نتائج بعد</div>
    <div class="log-list" id="logList"></div>
  </div>
</div>

<!-- Numpad -->

<div class="numpad-wrap">
  <div class="numpad">
    <button class="key" onclick="press('7')">7</button>
    <button class="key" onclick="press('8')">8</button>
    <button class="key" onclick="press('9')">9</button>
    <button class="key" onclick="press('4')">4</button>
    <button class="key" onclick="press('5')">5</button>
    <button class="key" onclick="press('6')">6</button>
    <button class="key" onclick="press('1')">1</button>
    <button class="key" onclick="press('2')">2</button>
    <button class="key" onclick="press('3')">3</button>
    <button class="key key-del" onclick="del()">⌫</button>
    <button class="key key-zero" onclick="press('0')">0</button>
    <button class="key key-enter enter-none" id="enterBtn" onclick="enter()">إضافة نقاط</button>
  </div>
</div>

<!-- Winner -->

<div class="overlay" id="overlay">
  <div class="win-inner">
    <div class="win-emoji">🏆</div>
    <div class="win-tag">الفائز!</div>
    <div class="win-name" id="winName"></div>
    <div class="win-detail">وصل إلى النقاط المستهدفة</div>
    <div class="win-score" id="winScore"></div>
    <button class="win-btn" id="winBtn" onclick="resetGame()">العب مجدداً</button>
  </div>
</div>

<script>
const TARGET = 202;
const scores = { A: 0, B: 0 };
let active = null;
let input = '';
let gameOver = false;
let history = [];
let historyOpen = false;

function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('historyBody').classList.toggle('open', historyOpen);
  document.getElementById('historyToggle').classList.toggle('open', historyOpen);
}

function addLog(t, pts, total) {
  const name = document.getElementById('name' + t).textContent.trim();
  history.unshift({ t, name, pts, total });
  renderLog();
  // Auto-open on first entry
  if (history.length === 1 && !historyOpen) toggleHistory();
}

function renderLog() {
  document.getElementById('historyCount').textContent = history.length;
  const empty = document.getElementById('historyEmpty');
  const list = document.getElementById('logList');
  if (!history.length) { empty.style.display = ''; list.innerHTML = ''; return; }
  empty.style.display = 'none';
  list.innerHTML = history.map(e => `
    <div class="log-row">
      <div class="log-dot d${e.t === 'A' ? '1' : '2'}"></div>
      <div class="log-name c${e.t === 'A' ? '1' : '2'}">${e.name}</div>
      <div class="log-pts">+${e.pts}</div>
      <div class="log-arrow">→</div>
      <div class="log-total">${e.total}</div>
    </div>`).join('');
}

function selectTeam(t) {
  if (gameOver) return;
  active = t;
  input = '';
  updatePending();
  updateActiveUI();
}

function updateActiveUI() {
  const cardA = document.getElementById('cardA');
  const cardB = document.getElementById('cardB');
  cardA.className = 'team-card' + (active === 'A' ? ' active-1' : '');
  cardB.className = 'team-card' + (active === 'B' ? ' active-2' : '');

  const btn = document.getElementById('enterBtn');
  if (!active) {
    btn.className = 'key key-enter enter-none';
    btn.textContent = 'إضافة نقاط';
    document.getElementById('hint').textContent = 'اضغط على فريق للاختيار ←';
  } else {
    const name = document.getElementById('name' + active).textContent.trim();
    btn.className = 'key key-enter enter-' + (active === 'A' ? '1' : '2');
    btn.textContent = 'إضافة إلى ' + name;
    document.getElementById('hint').textContent = 'تسجيل نقاط لـ ' + name;
  }
}

function press(d) {
  if (!active || gameOver) return;
  if (input.length >= 4) return;
  input += d;
  updatePending();
}

function del() {
  if (!active || gameOver) return;
  input = input.slice(0, -1);
  updatePending();
}

function updatePending() {
  ['A','B'].forEach(t => {
    const el = document.getElementById('pending' + t);
    if (t === active && input) {
      el.textContent = '+ ' + input;
      el.classList.add('has-val');
    } else {
      el.textContent = '';
      el.classList.remove('has-val');
    }
  });
}

function enter() {
  if (!active || gameOver) return;
  const val = parseInt(input);
  input = '';
  updatePending();
  if (!val || val <= 0) return;

  const t = active;
  scores[t] = Math.min(9999, scores[t] + val);

  const el = document.getElementById('score' + t);
  el.textContent = scores[t];
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');

  const pct = Math.min(100, (scores[t] / TARGET) * 100);
  document.getElementById('bar' + t).style.width = pct + '%';

  addLog(t, val, scores[t]);

  if (scores[t] >= TARGET) triggerWin(t);
}

function triggerWin(t) {
  gameOver = true;
  const name = document.getElementById('name' + t).textContent.trim();
  const cls = t === 'A' ? 'c1' : 'c2';
  document.getElementById('winName').textContent = name;
  document.getElementById('winName').className = 'win-name ' + cls;
  document.getElementById('winScore').textContent = scores[t];
  document.getElementById('winBtn').className = 'win-btn ' + cls;
  document.getElementById('overlay').classList.add('show');
}

function resetGame() {
  scores.A = 0; scores.B = 0;
  active = null; input = '';
  gameOver = false;
  history = [];
  historyOpen = false;
  document.getElementById('historyBody').classList.remove('open');
  document.getElementById('historyToggle').classList.remove('open');
  renderLog();
  ['A','B'].forEach(t => {
    document.getElementById('score' + t).textContent = '0';
    document.getElementById('bar' + t).style.width = '0%';
    document.getElementById('pending' + t).textContent = '';
    document.getElementById('pending' + t).classList.remove('has-val');
  });
  document.getElementById('overlay').classList.remove('show');
  updateActiveUI();
}

// Long press to edit name
let editTimer = null;
function startEditName(e, t) {
  e.stopPropagation();
  editTimer = setTimeout(() => {
    const el = document.getElementById('name' + t);
    el.contentEditable = 'true';
    el.focus();
    const r = document.createRange();
    r.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    el.onblur = () => {
      el.contentEditable = 'false';
      if (!el.textContent.trim()) el.textContent = t === 'A' ? 'Team 1' : 'Team 2';
      updateActiveUI();
    };
    el.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } };
  }, 500);
}
document.addEventListener('mouseup', () => clearTimeout(editTimer));
document.addEventListener('touchend', () => clearTimeout(editTimer));
</script>

</body>
</html>
